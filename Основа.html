<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 Мои Цели</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --accent-green: #00d09c;
            --accent-purple: #7209b7;
            --accent-orange: #f72585;
            --accent-teal: #4cc9f0;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: rgba(255,255,255,0.1);
            --success: #00d09c;
            --danger: #ff6b6b;
        }

        .light-theme {
            --bg-dark: #f5f6fa;
            --bg-card: #ffffff;
            --accent-green: #00d09c;
            --accent-purple: #7209b7;
            --accent-orange: #e67e22;
            --accent-teal: #4cc9f0;
            --text-primary: #1a1a2e;
            --text-secondary: #6c757d;
            --border: rgba(0,0,0,0.1);
            --success: #00d09c;
            --danger: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; padding: 16px; padding-bottom: 100px; }
        .container { max-width: 480px; margin: 0 auto; }
        [onclick] { cursor: pointer; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 16px; }
        .header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--accent-green), var(--accent-teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .theme-toggle { width: 40px; height: 40px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .awards-section { background: var(--bg-card); border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; }
        .awards-section:hover { border-color: var(--accent-green); }
        .awards-title { font-size: 12px; font-weight: 600; margin-bottom: 10px; }
        .awards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .award-card { text-align: center; padding: 10px 4px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 2px solid transparent; }
        .award-card.unlocked { border-color: var(--accent-green); background: rgba(0,208,156,0.1); }
        .award-card.locked { opacity: 0.4; }
        .award-icon { font-size: 24px; display: block; margin-bottom: 2px; }
        .award-card.locked .award-icon { filter: grayscale(100%); }
        .award-name { font-size: 10px; font-weight: 600; }
        .award-desc { font-size: 8px; color: var(--text-secondary); }

        .quick-actions { margin-bottom: 12px; }
        .reset-btn { width: 100%; padding: 12px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

        .stats-summary { background: var(--bg-card); border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; }
        .stats-summary:hover { border-color: var(--accent-green); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        .stat-item { text-align: center; padding: 6px 2px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--accent-green); }
        .stat-value.streak { color: var(--accent-orange); }
        .stat-value.percent { color: var(--accent-purple); }
        .stat-label { font-size: 8px; color: var(--text-secondary); margin-top: 1px; }
        .progress-container { background: rgba(255,255,255,0.1); border-radius: 5px; height: 6px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--accent-teal)); border-radius: 5px; transition: width 0.5s; }
        .progress-text { text-align: center; margin-top: 5px; font-size: 11px; color: var(--text-secondary); }

        .week-progress { background: var(--bg-card); border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
        .section-title { font-size: 12px; font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .edit-btn { background: rgba(255,255,255,0.1); border: none; color: var(--accent-green); padding: 5px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        .today-btn { background: var(--accent-green); border: none; color: var(--bg-dark); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .week-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .week-card { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 8px 4px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .week-card:hover { border-color: var(--accent-green); transform: scale(1.05); }
        .week-card.active { border-color: var(--accent-green); background: rgba(0,208,156,0.15); }
        .week-number { font-size: 9px; color: var(--text-secondary); margin-bottom: 2px; }
        .week-card.active .week-number { color: var(--accent-green); }
        .week-percent { font-size: 14px; font-weight: 700; }
        .week-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .week-bar-fill { height: 100%; background: var(--accent-green); border-radius: 2px; }

        .goals-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .goal-card { background: var(--bg-card); border-radius: 14px; padding: 12px; border: 1px solid var(--border); transition: all 0.2s; }
        .goal-card:hover { border-color: var(--accent-green); }
        .goal-card.achieved { border-color: var(--success); }
        .goal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .goal-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .goal-icon.sport { background: linear-gradient(135deg, #f72585, #ff6b6b); }
        .goal-icon.learning { background: linear-gradient(135deg, #7209b7, #b5179e); }
        .goal-icon.reading { background: linear-gradient(135deg, #4361ee, #4895ef); }
        .goal-icon.hair { background: linear-gradient(135deg, #f77f00, #fcbf49); }
        .goal-icon.phone { background: linear-gradient(135deg, #06d6a0, #118ab2); }
        .goal-icon.vitamins { background: linear-gradient(135deg, #ef476f, #ffd166); }
        .goal-icon.hardening { background: linear-gradient(135deg, #4cc9f0, #4895ef); }
        .goal-icon.default { background: linear-gradient(135deg, #667eea, #764ba2); }
        .goal-info { flex: 1; min-width: 0; }
        .goal-name { font-size: 13px; font-weight: 600; }
        .goal-target { font-size: 10px; color: var(--accent-green); }
        .goal-meta { display: flex; gap: 8px; align-items: center; }
        .goal-count { font-size: 14px; font-weight: 700; color: var(--text-secondary); }
        .goal-count.done { color: var(--success); }
        .goal-streak { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .goal-streak.active { color: var(--accent-orange); }

        .goal-fill-btn { width: 100%; padding: 8px; border-radius: 8px; background: rgba(0,208,156,0.15); border: 2px solid var(--accent-green); color: var(--accent-green); font-size: 11px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: all 0.2s; }
        .goal-fill-btn:hover { background: var(--accent-green); color: var(--bg-dark); }
        .goal-fill-btn.done { background: var(--accent-green); color: var(--bg-dark); }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-cell { aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.08); border: 2px solid transparent; }
        .day-cell:active { transform: scale(0.95); }
        .day-cell.done { background: var(--success); border-color: var(--success); }
        .day-name { font-size: 7px; font-weight: 600; color: var(--text-secondary); }
        .day-cell.done .day-name { color: var(--bg-dark); }
        .day-check { font-size: 10px; opacity: 0; }
        .day-cell.done .day-check { opacity: 1; }

        .chart-container { margin-top: 14px; }
        .bar-chart { display: flex; flex-direction: column; gap: 8px; }
        .bar-item { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 0; }
        .bar-item:hover { opacity: 0.8; }
        .bar-label { width: 60px; font-size: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 3px; white-space: nowrap; overflow: hidden; }
        .bar-label span { font-size: 12px; }
        .bar-track { flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 6px; }
        .bar-fill.sport { background: linear-gradient(90deg, #f72585, #ff6b6b); }
        .bar-fill.learning { background: linear-gradient(90deg, #7209b7, #b5179e); }
        .bar-fill.reading { background: linear-gradient(135deg, #4361ee, #4895ef); }
        .bar-fill.hair { background: linear-gradient(90deg, #f77f00, #fcbf49); }
        .bar-fill.phone { background: linear-gradient(90deg, #06d6a0, #118ab2); }
        .bar-fill.vitamins { background: linear-gradient(90deg, #ef476f, #ffd166); }
        .bar-fill.hardening { background: linear-gradient(90deg, #4cc9f0, #4895ef); }
        .bar-fill.default { background: linear-gradient(90deg, #667eea, #764ba2); }
        .bar-value { width: 30px; text-align: right; font-size: 10px; font-weight: 600; }

        .overall-stats { background: var(--bg-card); border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; }
        .overall-stats:hover { border-color: var(--accent-green); }
        .overall-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .overall-item { text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .overall-value { font-size: 20px; font-weight: 700; color: var(--accent-green); }
        .overall-label { font-size: 9px; color: var(--text-secondary); margin-top: 2px; }

        .bottom-actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-dark); padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: center; z-index: 100; }
        .action-btn { flex: 1; max-width: 150px; padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .action-btn.save { background: var(--accent-green); color: var(--bg-dark); }
        .action-btn.load { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; padding: 20px; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-card); border-radius: 18px; padding: 18px; max-width: 400px; width: 100%; max-height: 85vh; overflow-y: auto; transform: scale(0.9); transition: all 0.3s; }
        .modal.active .modal-content { transform: scale(1); }
        .modal h3 { font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .modal > p { color: var(--text-secondary); margin-bottom: 12px; font-size: 11px; }

        .goals-editor { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .goal-edit-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; }
        .goal-edit-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .icon-selector { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; padding: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; }
        .icon-option { width: 30px; height: 30px; border-radius: 6px; background: rgba(255,255,255,0.1); border: 2px solid transparent; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-option:hover, .icon-option.selected { border-color: var(--accent-green); background: rgba(0,208,156,0.2); }
        .goal-edit-input { flex: 1; background: rgba(255,255,255,0.1); border: none; border-radius: 6px; padding: 8px 10px; color: var(--text-primary); font-size: 12px; font-family: inherit; }
        .goal-edit-input:focus { outline: 2px solid var(--accent-green); }
        .goal-edit-target { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .goal-edit-target span { color: var(--text-secondary); font-size: 11px; }
        .target-input { width: 40px; background: rgba(255,255,255,0.1); border: none; border-radius: 6px; padding: 6px; color: var(--text-primary); font-size: 12px; text-align: center; font-family: inherit; }
        .target-input:focus { outline: 2px solid var(--accent-green); }
        .delete-goal-btn { background: rgba(255,100,100,0.2); border: none; color: var(--danger); padding: 6px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }
        .add-goal-btn { background: rgba(0,208,156,0.15); border: 2px dashed var(--accent-green); color: var(--accent-green); padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .modal-btns { display: flex; gap: 8px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn.cancel { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .modal-btn.confirm { background: var(--accent-green); color: var(--bg-dark); }

        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent-green); color: var(--bg-dark); padding: 10px 20px; border-radius: 25px; font-size: 12px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 1001; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Мои Цели</h1>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="awards-section" onclick="showAwardsInfo()">
            <div class="awards-title">🏆 Награды</div>
            <div class="awards-grid" id="awardsGrid"></div>
        </div>

        <div class="quick-actions">
            <button class="reset-btn" onclick="resetWeek()">🔄 Сбросить неделю</button>
        </div>

        <div class="stats-summary" onclick="showWeekStats()">
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-value" id="statCompleted">0</div><div class="stat-label">раз</div></div>
                <div class="stat-item"><div class="stat-value" id="statGoals">0/7</div><div class="stat-label">целей</div></div>
                <div class="stat-item"><div class="stat-value streak" id="statStreak">0</div><div class="stat-label">🔥 макс</div></div>
                <div class="stat-item"><div class="stat-value percent" id="statPercent">0%</div><div class="stat-label">%</div></div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progressBar" style="width: 0%"></div></div>
            <div class="progress-text" id="progressText">Начни!</div>
        </div>

        <div class="week-progress">
            <div class="section-title">
                <span>📅 Недели</span>
                <div style="display: flex; gap: 6px;">
                    <button class="today-btn" onclick="fillToday()">📍 Сегодня</button>
                    <button class="edit-btn" onclick="showGoalsModal()">✏️</button>
                </div>
            </div>
            <div class="week-grid" id="weekGrid"></div>
            <div class="chart-container"><div class="bar-chart" id="barChart"></div></div>
        </div>

        <div class="overall-stats" onclick="showOverallStats()">
            <div class="section-title">📈 Всё время (нажми)</div>
            <div class="overall-grid">
                <div class="overall-item"><div class="overall-value" id="totalAllTime">0</div><div class="overall-label">всего</div></div>
                <div class="overall-item"><div class="overall-value" id="avgPercent">0%</div><div class="overall-label">среднее</div></div>
            </div>
        </div>

        <div class="goals-list" id="goalsList"></div>
    </div>

    <div class="bottom-actions">
        <button class="action-btn save" onclick="exportData()">📤 Сохранить</button>
        <button class="action-btn load" onclick="document.getElementById('fileInput').click()">📥 Загрузить</button>
    </div>
    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">

    <div class="modal" id="goalsModal">
        <div class="modal-content">
            <h3>✏️ Редактировать</h3>
            <p>Меняй название и цель</p>
            <div class="goals-editor" id="goalsEditor"></div>
            <button class="add-goal-btn" onclick="addNewGoal()">➕ Добавить</button>
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="hideGoalsModal()">Отмена</button>
                <button class="modal-btn confirm" onclick="saveGoals()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="resetModal">
        <div class="modal-content">
            <h3>⚠️ Сброс</h3>
            <p>Удалить данные?</p>
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="hideResetModal()">Отмена</button>
                <button class="modal-btn confirm" onclick="resetAllData()">Сбросить</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
const availableIcons = ['🏃','📚','📖','💇','📱','💊','❄️','🏋️','🧘','🚴','🎯','💪','🧠','📝','🎨','🍎','💤','🚶','🏊','⛹️'];
const iconColors = ['sport','learning','reading','hair','phone','vitamins','hardening','sport','learning','sport','phone','sport','learning','reading','learning','vitamins','hardening','sport','sport','sport'];

const awards = [
    { icon: '🥉', name: 'Бронза', threshold: 50 },
    { icon: '🥈', name: 'Серебро', threshold: 75 },
    { icon: '🥇', name: 'Золото', threshold: 100 }
];

const defaultGoals = [
    { id: 'sport', name: 'Спорт', icon: '🏃', iconClass: 'sport', target: '2-3 раза/нед', targetMin: 2 },
    { id: 'learning', name: 'Обучение', icon: '📚', iconClass: 'learning', target: '3 раза/нед', targetMin: 3 },
    { id: 'reading', name: 'Чтение', icon: '📖', iconClass: 'reading', target: 'ежедневно', targetMin: 7 },
    { id: 'hair', name: 'Лечение волос', icon: '💇', iconClass: 'hair', target: '3 раза/нед', targetMin: 3 },
    { id: 'phone', name: 'Без телефона', icon: '📱', iconClass: 'phone', target: 'каждый день', targetMin: 7 },
    { id: 'vitamins', name: 'Витамины', icon: '💊', iconClass: 'vitamins', target: 'ежедневно', targetMin: 7 },
    { id: 'hardening', name: 'Закаливание', icon: '❄️', iconClass: 'hardening', target: '3 раза/нед', targetMin: 3 }
];

const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
const maxWeeks = 12;

let currentWeek = 1;
let data = {};
let goals = [];
let editedGoals = [];

function init() {
    loadData();
    renderAll();
}

function loadData() {
    const saved = localStorage.getItem('goalTracker');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            data = parsed.data || {};
            currentWeek = parsed.currentWeek || 1;
            goals = parsed.goals || JSON.parse(JSON.stringify(defaultGoals));
        } catch(e) {
            goals = JSON.parse(JSON.stringify(defaultGoals));
            data = { weeks: {} };
        }
    } else {
        goals = JSON.parse(JSON.stringify(defaultGoals));
        data = { weeks: {} };
        initAllWeeks();
        saveData();
    }
}

function initAllWeeks() {
    for (let w = 1; w <= maxWeeks; w++) {
        data.weeks[w] = {};
        goals.forEach(g => { data.weeks[w][g.id] = [0,0,0,0,0,0,0]; });
    }
}

function saveData() {
    localStorage.setItem('goalTracker', JSON.stringify({ data, currentWeek, goals }));
}

function getWeekData(week = currentWeek) {
    if (!data.weeks[week]) {
        data.weeks[week] = {};
        goals.forEach(g => { data.weeks[week][g.id] = [0,0,0,0,0,0,0]; });
    }
    return data.weeks[week];
}

function getWeekPercent(week = currentWeek) {
    const weekData = getWeekData(week);
    let achieved = 0;
    goals.forEach(g => {
        const done = (weekData[g.id] || [0,0,0,0,0,0,0]).filter(d => d === 1).length;
        if (done >= g.targetMin) achieved++;
    });
    return Math.round((achieved / goals.length) * 100);
}

// Calculate streak - sum done days from current week + previous weeks where goal was achieved
function calculateStreak(goalId) {
    const goal = goals.find(g => g.id === goalId);
    if (!goal) return 0;
    
    let streak = 0;
    let breakStreak = false;
    
    // Start from current week and go backwards
    for (let w = currentWeek; w >= 1; w--) {
        const weekData = data.weeks[w];
        if (!weekData || !weekData[goalId]) {
            break;
        }
        
        const daysData = weekData[goalId];
        const done = daysData.filter(d => d === 1).length;
        
        if (done >= goal.targetMin) {
            // Goal achieved this week - add all done days
            streak += done;
        } else {
            // Goal NOT achieved - stop counting
            break;
        }
    }
    
    return streak;
}

function selectWeek(week) {
    currentWeek = week;
    renderAll();
    saveData();
}

function toggleDay(goalId, dayIndex) {
    const weekData = getWeekData();
    if (!weekData[goalId]) weekData[goalId] = [0,0,0,0,0,0,0];
    weekData[goalId][dayIndex] = weekData[goalId][dayIndex] === 1 ? 0 : 1;
    saveData();
    renderAll();
}

function fillWeek(goalId) {
    const weekData = getWeekData();
    if (!weekData[goalId]) weekData[goalId] = [0,0,0,0,0,0,0];
    
    const goal = goals.find(g => g.id === goalId);
    if (!goal) return;
    
    const currentDone = weekData[goalId].filter(d => d === 1).length;
    
    if (currentDone >= goal.targetMin) {
        weekData[goalId] = [0,0,0,0,0,0,0];
        showToast('🔄 Сброшено');
    } else {
        let filled = currentDone;
        for (let i = 0; i < 7 && filled < goal.targetMin; i++) {
            if (weekData[goalId][i] === 0) {
                weekData[goalId][i] = 1;
                filled++;
            }
        }
        showToast('✅ Закрыто');
    }
    saveData();
    renderAll();
}

function resetWeek() {
    const weekData = getWeekData();
    goals.forEach(g => { weekData[g.id] = [0,0,0,0,0,0,0]; });
    saveData();
    renderAll();
    showToast('🔄 Сброшено');
}

function fillToday() {
    // Get current day of week (0=Пн, 6=Вс)
    const today = new Date().getDay();
    const dayIndex = today === 0 ? 6 : today - 1; // Sunday = 6 instead of 0
    
    const weekData = getWeekData();
    goals.forEach(g => {
        if (!weekData[g.id]) weekData[g.id] = [0,0,0,0,0,0,0];
        weekData[g.id][dayIndex] = 1;
    });
    saveData();
    renderAll();
    showToast('✅ ' + days[dayIndex] + ' выполнен!');
}

function renderAll() {
    renderAwards();
    renderWeekGrid();
    renderGoals();
    renderStats();
    renderChart();
    renderOverallStats();
}

function renderAwards() {
    const container = document.getElementById('awardsGrid');
    const weekPercent = getWeekPercent();
    container.innerHTML = awards.map(a => {
        const unlocked = weekPercent >= a.threshold;
        return `<div class="award-card ${unlocked ? 'unlocked' : 'locked'}">
            <span class="award-icon">${a.icon}</span>
            <div class="award-name">${a.name}</div>
            <div class="award-desc">${a.threshold}%</div>
        </div>`;
    }).join('');
}

function renderOverallStats() {
    let totalAll = 0, weeksWithData = 0, totalPercent = 0;
    for (let w = 1; w <= maxWeeks; w++) {
        const weekData = data.weeks[w];
        if (!weekData) continue;
        let achieved = 0;
        goals.forEach(g => {
            totalAll += (weekData[g.id] || [0,0,0,0,0,0,0]).filter(d => d === 1).length;
            if ((weekData[g.id] || [0,0,0,0,0,0,0]).filter(d => d === 1).length >= g.targetMin) achieved++;
        });
        if ((weekData[goals[0]?.id] || []).some(d => d === 1)) weeksWithData++;
        totalPercent += getWeekPercent(w);
    }
    document.getElementById('totalAllTime').textContent = totalAll;
    document.getElementById('avgPercent').textContent = (weeksWithData ? Math.round(totalPercent / weeksWithData) : 0) + '%';
}

function renderWeekGrid() {
    const container = document.getElementById('weekGrid');
    let html = '';
    for (let w = 1; w <= maxWeeks; w++) {
        const percent = getWeekPercent(w);
        const isActive = w === currentWeek;
        html += `<div class="week-card ${isActive ? 'active' : ''}" onclick="selectWeek(${w})">
            <div class="week-number">Н${w}</div>
            <div class="week-percent" style="color: ${isActive ? 'var(--accent-green)' : 'var(--text-secondary)'}">${percent}%</div>
            <div class="week-bar"><div class="week-bar-fill" style="width: ${percent}%"></div></div>
        </div>`;
    }
    container.innerHTML = html;
}

function renderGoals() {
    const container = document.getElementById('goalsList');
    const weekData = getWeekData();
    let html = '';
    goals.forEach(g => {
        const daysData = weekData[g.id] || [0,0,0,0,0,0,0];
        const done = daysData.filter(d => d === 1).length;
        const achieved = done >= g.targetMin;
        // Use calculated streak (sums all weeks where goal was achieved)
        const streak = calculateStreak(g.id);
        
        html += `<div class="goal-card ${achieved ? 'achieved' : ''}">
            <div class="goal-header">
                <div class="goal-icon ${g.iconClass || 'default'}">${g.icon}</div>
                <div class="goal-info">
                    <div class="goal-name">${g.name}</div>
                    <div class="goal-target">цель: ${g.targetMin} раз</div>
                </div>
                <div class="goal-meta">
                    <div class="goal-streak ${streak >= 3 ? 'active' : ''}">🔥 ${streak}</div>
                    <div class="goal-count ${achieved ? 'done' : ''}">${done}/${g.targetMin}</div>
                </div>
            </div>
            <button class="goal-fill-btn ${achieved ? 'done' : ''}" onclick="fillWeek('${g.id}')">
                ${achieved ? '✓ Закрыто' : '📅 Закрыть'}
            </button>
            <div class="days-grid">
                ${days.map((d, i) => `<div class="day-cell ${daysData[i] ? 'done' : ''}" onclick="toggleDay('${g.id}', ${i})">
                    <span class="day-name">${d}</span>
                    <span class="day-check">✓</span>
                </div>`).join('')}
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

function renderStats() {
    const weekData = getWeekData();
    let totalDone = 0, goalsAchieved = 0, maxStreak = 0;
    goals.forEach(g => {
        const daysData = weekData[g.id] || [0,0,0,0,0,0,0];
        const done = daysData.filter(d => d === 1).length;
        totalDone += done;
        if (done >= g.targetMin) goalsAchieved++;
        const s = calculateStreak(g.id);
        if (s > maxStreak) maxStreak = s;
    });
    const percent = Math.round((goalsAchieved / goals.length) * 100);
    document.getElementById('statCompleted').textContent = totalDone;
    document.getElementById('statGoals').textContent = goalsAchieved + '/' + goals.length;
    document.getElementById('statStreak').textContent = maxStreak;
    document.getElementById('statPercent').textContent = percent + '%';
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressText').textContent = goalsAchieved === goals.length ? '🎉 Все!' : (goalsAchieved > 0 ? goalsAchieved + '/' + goals.length : 'Начни!');
}

function renderChart() {
    const container = document.getElementById('barChart');
    const weekData = getWeekData();
    container.innerHTML = goals.map(g => {
        const done = (weekData[g.id] || [0,0,0,0,0,0,0]).filter(d => d === 1).length;
        const percent = Math.round((done / g.targetMin) * 100);
        return `<div class="bar-item" onclick="fillWeek('${g.id}')" title="Нажми чтобы заполнить ${g.name}">
            <div class="bar-label"><span>${g.icon}</span>${g.name}</div>
            <div class="bar-track"><div class="bar-fill ${g.iconClass || 'default'}" style="width: ${Math.min(percent, 100)}%"></div></div>
            <div class="bar-value">${percent}%</div>
        </div>`;
    }).join('');
}

function exportData() {
    const blob = new Blob([JSON.stringify({ data, currentWeek, goals, version: '1.4' }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'my-goals.json';
    a.click();
    showToast('📤 Сохранено!');
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (imported.data && imported.goals) {
                data = imported.data;
                currentWeek = imported.currentWeek || 1;
                goals = imported.goals;
                saveData();
                renderAll();
                showToast('📥 Загружено!');
            } else {
                showToast('⚠️ Ошибка');
            }
        } catch(err) {
            showToast('⚠️ Ошибка');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function showGoalsModal() {
    editedGoals = JSON.parse(JSON.stringify(goals));
    const container = document.getElementById('goalsEditor');
    container.innerHTML = editedGoals.map((g, idx) => `
        <div class="goal-edit-item">
            <div class="goal-edit-row">
                <input type="text" class="goal-edit-input" value="${g.name}" onchange="editedGoals[${idx}].name = this.value" style="flex:1">
                <button class="delete-goal-btn" onclick="deleteGoal(${idx})">✕</button>
            </div>
            <div class="icon-selector">
                ${availableIcons.map((icon, i) => `<div class="icon-option ${icon === g.icon ? 'selected' : ''}" onclick="selectIcon(${idx}, '${icon}', '${iconColors[i]}')">${icon}</div>`).join('')}
            </div>
            <div class="goal-edit-target">
                <span>раз:</span>
                <input type="number" class="target-input" value="${g.targetMin}" min="1" max="7" onchange="editedGoals[${idx}].targetMin = parseInt(this.value) || 1">
            </div>
        </div>
    `).join('');
    document.getElementById('goalsModal').classList.add('active');
}

function selectIcon(idx, icon, colorClass) {
    editedGoals[idx].icon = icon;
    editedGoals[idx].iconClass = colorClass;
    showGoalsModal();
}

function deleteGoal(idx) {
    if (editedGoals.length > 1) {
        editedGoals.splice(idx, 1);
        showGoalsModal();
    } else {
        showToast('⚠️ Минимум 1');
    }
}

function addNewGoal() {
    editedGoals.push({ id: 'goal_' + Date.now(), name: 'Новая', icon: '🎯', iconClass: 'default', target: '3 раза', targetMin: 3 });
    showGoalsModal();
}

function hideGoalsModal() { document.getElementById('goalsModal').classList.remove('active'); }

function saveGoals() {
    const weekData = getWeekData();
    editedGoals.forEach(g => { if (weekData[g.id] === undefined) weekData[g.id] = [0,0,0,0,0,0,0]; });
    goals = JSON.parse(JSON.stringify(editedGoals));
    saveData();
    hideGoalsModal();
    renderAll();
    showToast('✅ Сохранено!');
}

function showResetModal() { document.getElementById('resetModal').classList.add('active'); }
function hideResetModal() { document.getElementById('resetModal').classList.remove('active'); }

function resetAllData() {
    localStorage.removeItem('goalTracker');
    goals = JSON.parse(JSON.stringify(defaultGoals));
    data = { weeks: {} };
    initAllWeeks();
    currentWeek = 1;
    hideResetModal();
    renderAll();
    showToast('🗑️ Сброшено');
}

function toggleTheme() {
    document.body.classList.toggle('light-theme');
    document.getElementById('themeToggle').textContent = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
    localStorage.setItem('goalTrackerTheme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function showAwardsInfo() {
    const weekPercent = getWeekPercent();
    let msg = `🏆 Награды недели: ${weekPercent}%\n\n`;
    awards.forEach(a => {
        const unlocked = weekPercent >= a.threshold;
        msg += `${a.icon} ${a.name} — ${a.threshold}% ${unlocked ? '✓' : '🔒'}\n`;
    });
    alert(msg);
}

function showOverallStats() {
    let totalAll = 0, weeksWithData = 0, totalPercent = 0, bestWeek = 0, bestWeekNum = 0;
    for (let w = 1; w <= maxWeeks; w++) {
        const weekData = data.weeks[w];
        if (!weekData) continue;
        goals.forEach(g => {
            totalAll += (weekData[g.id] || [0,0,0,0,0,0,0]).filter(d => d === 1).length;
        });
        if ((weekData[goals[0]?.id] || []).some(d => d === 1)) weeksWithData++;
        const pct = getWeekPercent(w);
        totalPercent += pct;
        if (pct > bestWeek) { bestWeek = pct; bestWeekNum = w; }
    }
    const avg = weeksWithData ? Math.round(totalPercent / weeksWithData) : 0;
    alert(`📈 Статистика\n\nВсего выполнено: ${totalAll}\nЛучшая неделя: Н${bestWeekNum} (${bestWeek}%)\nСредний %: ${avg}%`);
}

function showWeekStats() {
    const weekData = getWeekData();
    let totalDone = 0, goalsAchieved = 0, maxStreak = 0, bestGoal = '', bestGoalCount = 0;
    goals.forEach(g => {
        const daysData = weekData[g.id] || [0,0,0,0,0,0,0];
        const done = daysData.filter(d => d === 1).length;
        totalDone += done;
        if (done >= g.targetMin) goalsAchieved++;
        const s = calculateStreak(g.id);
        if (s > maxStreak) maxStreak = s;
        if (done > bestGoalCount) { bestGoalCount = done; bestGoal = g.name; }
    });
    const percent = Math.round((goalsAchieved / goals.length) * 100);
    alert(`📊 Неделя ${currentWeek}\n\nВыполнено: ${totalDone} раз\nЦелей достигнуто: ${goalsAchieved}/${goals.length}\nЛучшая цель: ${bestGoal} (${bestGoalCount})\nМакс. серия: ${maxStreak}\nПроцент: ${percent}%`);
}

document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); }));

if (localStorage.getItem('goalTrackerTheme') === 'light') {
    document.body.classList.add('light-theme');
    document.getElementById('themeToggle').textContent = '☀️';
}

init();
    </script>
</body>
</html>
